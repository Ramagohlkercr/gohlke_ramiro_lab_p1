<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Card | Ramiro Gohlke</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <article class="news-card">
        <div class="news-card__image-wrap">
          <img
            class="news-card__image"
            src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1100&q=80"
            alt="Computadora portatil con graficos y datos digitales en pantalla"
          />
        </div>

        <div class="news-card__content">
          <span class="news-card__badge">Tecnolog&iacute;a</span>

          <div class="news-card__text">
            <h1>La inteligencia artificial impulsa nuevas formas de aprender</h1>
            <p>
              Instituciones educativas incorporan herramientas digitales para
              personalizar el seguimiento de estudiantes y mejorar la
              experiencia dentro del aula.
            </p>
          </div>

          <div class="news-card__footer">
            <div class="news-card__meta">
              <strong>Ramiro Gohlke</strong>
              <div class="news-card__meta-row">
                <time datetime="2026-05-19">19 de mayo de 2026</time>
                <span class="news-card__dot"></span>
                <span>4 min de lectura</span>
              </div>
            </div>

            <a class="news-card__link" href="#" aria-label="Leer mas sobre esta noticia">
              Leer m&aacute;s <span class="arrow" aria-hidden="true">&rarr;</span>
            </a>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
